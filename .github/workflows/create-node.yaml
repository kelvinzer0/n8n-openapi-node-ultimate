name: Create / Update n8n Community Node

on:
  workflow_dispatch:
    inputs:
      openapi_url:
        description: 'URL to OpenAPI spec (JSON or YAML)'
        required: true
        type: string
      custom_name:
        description: 'Custom name (e.g. "Evolution" → creates n8n-nodes-evolution)'
        required: true
        type: string
      logo_url:
        description: 'Logo URL (SVG or PNG)'
        required: false
        type: string
        default: ''
      description:
        description: 'Short description for the node'
        required: false
        type: string
        default: ''
      publish_npm:
        description: 'Publish to npm'
        required: false
        type: boolean
        default: false
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        type: string
        default: '1.0.0'

env:
  NODE_VERSION: '20'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout this repo (generator)
        uses: actions/checkout@v4
        with:
          path: generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install generator dependencies
        run: |
          cd generator
          npm ci

      - name: Build generator
        run: |
          cd generator
          npm run build

      - name: Run scaffolder
        id: scaffold
        env:
          OPENAPI_URL: ${{ inputs.openapi_url }}
          CUSTOM_NAME: ${{ inputs.custom_name }}
          LOGO_URL: ${{ inputs.logo_url }}
          DESCRIPTION: ${{ inputs.description }}
          INPUT_VERSION: ${{ inputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
          NPM_SCOPE: 'n8n-dev'
          GITHUB_ORG: 'n8n-code'
        run: |
          DIR_NAME="n8n-nodes-$(echo "${{ inputs.custom_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')"

          # Fetch latest version from npm registry
          LATEST_VERSION=$(npm view "@n8n-dev/${DIR_NAME}" version 2>/dev/null || echo "0.0.0")

          # Auto-increment patch version if INPUT_VERSION is not provided, or is '1.0.0' / '1.1.0' (default placeholder)
          if [ -z "${INPUT_VERSION}" ] || [ "${INPUT_VERSION}" = "1.0.0" ]; then
            if [ "${LATEST_VERSION}" != "0.0.0" ]; then
              IFS='.' read -r major minor patch <<< "${LATEST_VERSION}"
              patch=$((patch + 1))
              VERSION="${major}.${minor}.${patch}"
            else
              VERSION="1.0.0"
            fi
          else
            VERSION="${INPUT_VERSION}"
          fi

          echo "🚀 Using version: ${VERSION} (latest on npm: ${LATEST_VERSION})"

          # Inject VERSION environment variable for scaffold-node script
          export VERSION="${VERSION}"
          node generator/scripts/scaffold-node.mjs

          echo "dir_name=${DIR_NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Build node project
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          npm install --ignore-scripts --legacy-peer-deps
          npm run build
          echo "✅ Build complete"

      - name: Check if repo exists
        id: check_repo
        run: |
          REPO_NAME="${{ steps.scaffold.outputs.dir_name }}"
          if gh repo view "n8n-code/${REPO_NAME}" --json name 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
            echo "📁 Repo exists, will update"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
            echo "📁 Repo does not exist, will create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create repo (if new)
        if: steps.check_repo.outputs.exists == 'false'
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          gh auth setup-git
          git init -b main
          git add -A
          git commit -m "feat: initial n8n community node for ${{ inputs.custom_name }}"
          gh repo create "n8n-code/${{ steps.check_repo.outputs.repo_name }}" --public \
            --description "n8n community node for ${{ inputs.custom_name }} API" \
            --source=. --remote=origin --push
          echo "✅ Repo created"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Update repo (if exists)
        if: steps.check_repo.outputs.exists == 'true'
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          gh auth setup-git
          git init -b main
          git remote add origin "https://github.com/n8n-code/${{ steps.check_repo.outputs.repo_name }}.git"
          git fetch origin main || true
          git reset origin/main || true
          git add -A
          git diff --cached --quiet || git commit -m "chore: update node from OpenAPI spec (${{ steps.scaffold.outputs.version }})"
          git push origin main
          echo "✅ Repo updated"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Create GitHub Release
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          gh release create "v${{ steps.scaffold.outputs.version }}" \
            --title "v${{ steps.scaffold.outputs.version }}" \
            --notes "Auto-generated from OpenAPI spec" \
            --target main 2>/dev/null || echo "Release tag may already exist"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Set GitHub repo topics & npm link
        run: |
          REPO_NAME="${{ steps.scaffold.outputs.dir_name }}"
          CUSTOM_NAME_LOWER=$(echo "${{ inputs.custom_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          NPM_URL="https://www.npmjs.com/package/@n8n-dev/${REPO_NAME}"

          echo "🏷️ Setting GitHub topics..."
          gh repo edit "n8n-code/${REPO_NAME}" \
            --add-topic "n8n" \
            --add-topic "n8n-community-node" \
            --add-topic "n8n-node" \
            --add-topic "openapi" \
            --add-topic "swagger" \
            --add-topic "api" \
            --add-topic "${CUSTOM_NAME_LOWER}" \
            --add-topic "automation" \
            --add-topic "workflow" \
            --homepage "$NPM_URL" \
            --description "${{ inputs.description }}" 2>&1 || echo "⚠️ Could not set topics"

          echo "✅ Topics and npm link set"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Publish to npm
        if: inputs.publish_npm == true
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          npm publish --access public 2>&1 || {
            echo "⚠️ npm publish failed. Make sure NPM_TOKEN is set in repo secrets."
            exit 1
          }
          echo "✅ Published @n8n-dev/${{ steps.scaffold.outputs.dir_name }}@${{ steps.scaffold.outputs.version }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
