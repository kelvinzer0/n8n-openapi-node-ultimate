name: Create / Update n8n Community Node

on:
  workflow_dispatch:
    inputs:
      openapi_url:
        description: 'URL to OpenAPI spec (JSON or YAML)'
        required: true
        type: string
      custom_name:
        description: 'Custom name (e.g. "Evolution" → creates n8n-nodes-evolution)'
        required: true
        type: string
      logo_url:
        description: 'Logo URL (SVG or PNG)'
        required: false
        type: string
        default: ''
      description:
        description: 'Short description for the node'
        required: false
        type: string
        default: ''
      publish_npm:
        description: 'Publish to npm'
        required: false
        type: boolean
        default: false
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        type: string
        default: '1.0.0'

env:
  NODE_VERSION: '20'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout this repo (generator)
        uses: actions/checkout@v4
        with:
          path: generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install generator dependencies
        run: |
          cd generator
          npm ci

      - name: Build generator
        run: |
          cd generator
          npm run build

      - name: Run scaffolder
        id: scaffold
        env:
          OPENAPI_URL: ${{ inputs.openapi_url }}
          CUSTOM_NAME: ${{ inputs.custom_name }}
          LOGO_URL: ${{ inputs.logo_url }}
          DESCRIPTION: ${{ inputs.description }}
          VERSION: ${{ inputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          node generator/scripts/scaffold-node.mjs
          # Compute directory name (same logic as scaffold script)
          DIR_NAME="n8n-nodes-$(echo "${{ inputs.custom_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')"
          echo "dir_name=${DIR_NAME}" >> $GITHUB_OUTPUT
          echo "done=true" >> $GITHUB_OUTPUT

      - name: Build node project
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          npm install --ignore-scripts
          npx tsc --noEmit 2>&1 || true
          echo "✅ Build complete (skipped native modules)"

      - name: Check if repo exists
        id: check_repo
        run: |
          REPO_NAME="${{ steps.scaffold.outputs.dir_name }}"
          if gh repo view "${{ github.repository_owner }}/${REPO_NAME}" --json name 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
            echo "📁 Repo exists, will update"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
            echo "📁 Repo does not exist, will create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create repo (if new)
        if: steps.check_repo.outputs.exists == 'false'
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          git init
          git add -A
          git commit -m "feat: initial n8n community node for ${{ inputs.custom_name }}"
          gh repo create "${{ github.repository_owner }}/${{ steps.check_repo.outputs.repo_name }}" --public \
            --description "n8n community node for ${{ inputs.custom_name }} API" \
            --source=. --remote=origin --push
          echo "✅ Repo created"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repo (if exists)
        if: steps.check_repo.outputs.exists == 'true'
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          git init
          git remote add origin "https://github.com/${{ github.repository_owner }}/${{ steps.check_repo.outputs.repo_name }}.git"
          git fetch origin main || true
          git checkout -b main || git checkout main
          git add -A
          git diff --cached --quiet || git commit -m "chore: update node from OpenAPI spec (${{ inputs.version }})"
          git push origin main
          echo "✅ Repo updated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "Auto-generated from OpenAPI spec" \
            --target main 2>/dev/null || echo "Release tag may already exist"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: inputs.publish_npm == true
        run: |
          cd ${{ steps.scaffold.outputs.dir_name }}
          npm publish --access public 2>&1 || {
            echo "⚠️ npm publish failed. Make sure NPM_TOKEN is set in repo secrets."
            exit 1
          }
          echo "✅ Published"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
